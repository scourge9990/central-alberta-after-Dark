<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – Central Alberta After Dark</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #003594;
      color: #fff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #002a6e;
      border: 3px solid #FFEB43;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    h1 {
      margin: 0 0 0.5rem;
      color: #FFEB43;
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    p.subtitle { color: #ccc; font-size: 0.9rem; margin: 0 0 1.5rem; }
    label { display: block; font-size: 0.85rem; color: #ccc; margin-bottom: 0.25rem; }
    input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 2px solid #FFEB43;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      font-family: Arial, sans-serif;
      margin-bottom: 1.2rem;
    }
    input:focus { outline: none; border-color: #fff; }
    button {
      width: 100%;
      padding: 0.8rem;
      background: #FFEB43;
      color: #003594;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert {
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .alert-error { background: rgba(238,39,55,0.2); border: 1px solid #EE2737; }
    .alert-success { background: rgba(13,104,38,0.25); border: 1px solid #0D6826; }
    .back-link { display: block; text-align: center; margin-top: 1rem; color: #FFEB43; font-size: 0.85rem; }
    .back-link a { color: #FFEB43; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password 🔑</h1>
    <p class="subtitle">Enter your new password below.</p>

    <div class="alert alert-error" id="msg-error" role="alert"></div>
    <div class="alert alert-success" id="msg-success"></div>

    <form id="reset-form" novalidate>
      <label for="new-password">New Password (min 8 characters)</label>
      <input type="password" id="new-password" name="password" autocomplete="new-password" required minlength="8" />
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" name="confirm_password" autocomplete="new-password" required minlength="8" />
      <button type="submit" id="submit-btn">Set New Password</button>
    </form>

    <div class="back-link"><a href="/">← Back to Central Alberta After Dark</a></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('msg-error').textContent = 'Invalid or missing reset token. Please request a new password reset.';
      document.getElementById('msg-error').style.display = 'block';
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;
      const errEl    = document.getElementById('msg-error');
      const okEl     = document.getElementById('msg-success');
      const btn      = document.getElementById('submit-btn');

      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        const res = await fetch(`/api/reset-password/${encodeURIComponent(token)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();

        if (res.ok) {
          okEl.textContent = '✅ ' + data.message + ' Redirecting to login…';
          okEl.style.display = 'block';
          document.getElementById('reset-form').style.display = 'none';
          setTimeout(() => { window.location.href = '/?login=1'; }, 2500);
        } else {
          errEl.textContent = data.error || 'Reset failed. Please request a new link.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Set New Password';
        }
      } catch (_) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    });

    // Auto-open login modal if redirected after successful reset
    window.addEventListener('load', () => {
      const p = new URLSearchParams(window.location.search);
      if (p.get('login') === '1' && window.opener) {
        window.opener.openModal && window.opener.openModal('modal-login');
      }
    });
  </script>
</body>
</html>
