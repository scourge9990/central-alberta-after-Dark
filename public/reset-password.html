<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – Central Alberta After Dark</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #003594;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(0,0,0,0.4);
      border: 2px solid #FFEB43;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    h1 { color: #FFEB43; margin-top: 0; font-size: 1.6rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.7rem;
      border: 2px solid #FFEB43;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: #FFEB43;
      color: #003594;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #ffe000; }
    #message {
      margin-top: 1rem;
      padding: 0.7rem;
      border-radius: 6px;
      display: none;
      font-size: 0.95rem;
    }
    #message.success { background: #0D6826; }
    #message.error   { background: #EE2737; }
    a { color: #FFEB43; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔑 Reset Your Password</h1>
    <p>Enter a new password for your account.</p>

    <form id="reset-form">
      <label for="password">New Password (min 8 characters)</label>
      <input type="password" id="password" name="password" minlength="8" required />

      <label for="confirm">Confirm New Password</label>
      <input type="password" id="confirm" name="confirm" minlength="8" required />

      <button type="submit">Set New Password</button>
    </form>

    <div id="message"></div>

    <p style="margin-top:1.5rem; font-size:0.9rem;">
      <a href="/">← Back to Central Alberta After Dark</a>
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('reset-form').innerHTML =
        '<p style="color:#FFEB43;">⚠️ No reset token found. Please use the link from your email.</p>';
    }

    async function getCsrfToken() {
      const res = await fetch('/api/csrf-token');
      const data = await res.json();
      return data.csrfToken;
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('message');
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        msgEl.textContent = 'Passwords do not match.';
        msgEl.className = 'error';
        msgEl.style.display = 'block';
        return;
      }

      try {
        const csrfToken = await getCsrfToken();
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'CSRF-Token': csrfToken,
          },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();

        if (res.ok) {
          msgEl.textContent = '✅ ' + data.message + ' Redirecting to home…';
          msgEl.className = 'success';
          msgEl.style.display = 'block';
          document.getElementById('reset-form').style.display = 'none';
          setTimeout(() => { window.location.href = '/'; }, 3000);
        } else {
          msgEl.textContent = '❌ ' + (data.error || 'Something went wrong.');
          msgEl.className = 'error';
          msgEl.style.display = 'block';
        }
      } catch (err) {
        msgEl.textContent = '❌ Network error. Please try again.';
        msgEl.className = 'error';
        msgEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
