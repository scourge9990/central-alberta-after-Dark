<!DOCTYPE html>
<html>
<head>
  <title>Welcome to Night Owl! 🦉</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #003594 url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&q=60&w=2000') no-repeat center center fixed;
      background-size: cover;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, transparent 25%, rgba(0,53,148,0.7) 50%, rgba(0,53,148,0.95) 100%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 500px;
    }
    h1 {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #FFEB43;
    }
    .owl { font-size: 4rem; margin-bottom: 1rem; }
    p { color: #ddd; font-size: 1.1rem; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: #FFEB43;
      color: #003594;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 1rem;
    }
    .btn:hover { background: #fff; }
    .premium-badge {
      display: inline-block;
      background: #FFEB43;
      color: #003594;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 1.2rem;
      margin: 1rem 0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <div class="owl">🎉</div>
    <h1>Congratulations!</h1>
    <div class="premium-badge">🌙 You're a Full-Fledged Shift Worker! 🦉</div>
    <p>Welcome to the Central Alberta Shift Worker Community. Your premium membership is now active.</p>
    <a href="/" class="btn">Start Connecting</a>
  </div>
</body>
</html>
